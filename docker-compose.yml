version: "3.9"

services:
  insurance-api:
    build: .
    container_name: insurance-api
    ports:
      - "8000:8000"
    volumes:
      # Monte le dossier model/ en lecture seule dans le container
      - ./model:/app/model:ro
    environment:
      - MODEL_PATH=model/model.pkl
      - ENCODERS_PATH=model/encoders.pkl
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
